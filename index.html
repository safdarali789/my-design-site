<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Hub</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 50px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .lang-btn { background: #333; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; }
        h1 { color: #2c3e50; }
        .btn-group { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .btn { padding: 15px; border-radius: 8px; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .primary { background: #007bff; color: white; }
        .secondary { background: #6c757d; color: white; }
        .btn:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div class="container">
    <button class="lang-btn" onclick="toggleLang()">English / اردو</button>
    
    <h1 id="title">خوش آمدید!</h1>
    <p id="desc">اپنے سوشل میڈیا ڈیزائن اور اینیمیٹڈ پوسٹس یہاں بنائیں۔</p>
    
    <div class="btn-group">
        <a href="#" class="btn primary" id="btn1">ڈیزائن شروع کریں</a>
        <a href="#" class="btn secondary" id="btn2">ڈاؤنلوڈر سروس (جلد آ رہی ہے)</a>
    </div>
</div>

<script>
    let isUrdu = true;
    function toggleLang() {
        isUrdu = !isUrdu;
        document.documentElement.dir = isUrdu ? "rtl" : "ltr";
        document.getElementById("title").innerText = isUrdu ? "خوش آمدید!" : "Welcome!";
        document.getElementById("desc").innerText = isUrdu ? "اپنے سوشل میڈیا ڈیزائن اور اینیمیٹڈ پوسٹس یہاں بنائیں۔" : "Create your social media designs and animated posts here.";
        document.getElementById("btn1").innerText = isUrdu ? "ڈیزائن شروع کریں" : "Start Designing";
        document.getElementById("btn2").innerText = isUrdu ? "ڈاؤنلوڈر سروس (جلد آ رہی ہے)" : "Downloader Service (Coming Soon)";
    }
</script>

</body>
</html>
